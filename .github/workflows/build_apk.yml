name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK + NDK
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          # cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          sudo unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          sudo mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest 2>/dev/null || true
          sudo mkdir -p $ANDROID_SDK_ROOT/tools/bin
          sudo ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          sudo mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" | sudo tee $ANDROID_SDK_ROOT/licenses/android-sdk-license > /dev/null
          yes | sudo $ANDROID_SDK_ROOT/tools/bin/sdkmanager "platform-tools" "build-tools;35.0.0" "platforms;android-33"

          # Make aidl symlink for buildozer
          AIDL=$(find $ANDROID_SDK_ROOT/build-tools -name aidl -type f | head -1)
          if [ -n "$AIDL" ]; then
            sudo mkdir -p $ANDROID_SDK_ROOT/tools/bin
            sudo ln -sf "$AIDL" $ANDROID_SDK_ROOT/tools/bin/aidl
          fi

          # NDK 28c
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          sudo unzip -q android-ndk-r28c-linux.zip -d /usr/local/lib/
          echo "ANDROID_NDK_HOME=/usr/local/lib/android-ndk-r28c" >> $GITHUB_ENV

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=/usr/local/lib/android-ndk-r28c
          mkdir -p $HOME/.buildozer/android/platform
          ln -sf /usr/local/lib/android/sdk $HOME/.buildozer/android/platform/android-sdk
          ln -sf /usr/local/lib/android-ndk-r28c $HOME/.buildozer/android/platform/android-ndk-r28c
          python3 -m buildozer android debug



      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuplicateImageFinder-APK
          path: bin/*.apk
