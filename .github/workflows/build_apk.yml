name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk autoconf libtool cmake pkg-config \
            libltdl-dev libffi-dev libssl-dev zip unzip

      - name: Install Buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd $GITHUB_WORKSPACE
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK/licenses/android-sdk-license"
          REAL_SDKMANAGER=$(find "$SDK/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)
          mkdir -p "$SDK/tools/bin"
          ln -sf "$REAL_SDKMANAGER" "$SDK/tools/bin/sdkmanager"
          buildozer android debug




      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuplicateImageFinder-APK
          path: bin/*.apk
