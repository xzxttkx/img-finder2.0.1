name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Buildozer
        run: python3 -m pip install buildozer cython

      - name: Build APK
        run: |
          sudo apt install -y autoconf libtool m4
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724
          mkdir -p $ANDROID_HOME/tools/bin
          CMDSDK=$(find $ANDROID_HOME/cmdline-tools -name sdkmanager -type f | head -1)
          ln -sf "$CMDSDK" $ANDROID_HOME/tools/bin/sdkmanager
          mkdir -p $HOME/.buildozer/android/platform
          ln -sf $ANDROID_HOME $HOME/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_NDK_HOME $HOME/.buildozer/android/platform/android-ndk-r28c
          python3 -m buildozer android debug



      - name: Show p4a error log (if failed)
        if: failure()
        run: |
          find $HOME/.buildozer -name "*.log" -exec echo "=== {} ===" \; -exec tail -100 {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DuplicateImageFinder-APK
          path: bin/*.apk
